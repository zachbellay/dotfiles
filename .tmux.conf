# Terminal and input behavior
set -g default-terminal "tmux-256color"
set -g terminal-features "xterm*:clipboard:ccolour:cstyle:extkeys:focus:title,screen*:title,rxvt*:ignorefkeys,xterm-ghostty:RGB:extkeys"
set -g mouse on
set -sg escape-time 10
set -g focus-events on
set -s extended-keys always
set -s extended-keys-format csi-u
set -g history-limit 50000

# Ghostty sends Shift+Enter as CSI-u; keep it distinct from Ctrl-J so
# Codex and other TUIs can handle it as Shift+Enter instead of Enter/LF.

# Index panes and windows from 1.
set -g base-index 1
setw -g pane-base-index 1

# Use vi keys in copy mode.
setw -g mode-keys vi

# Make mouse wheel scrollback less jumpy.
bind-key -T copy-mode-vi WheelUpPane send-keys -N 2 -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -N 2 -X scroll-down
bind-key -T copy-mode-emacs WheelUpPane send-keys -N 2 -X scroll-up
bind-key -T copy-mode-emacs WheelDownPane send-keys -N 2 -X scroll-down

# Move between panes with prefix + arrow.
bind -r Up select-pane -U
bind -r Down select-pane -D
bind -r Left select-pane -L
bind -r Right select-pane -R

# Resize panes with prefix + Option/Alt + arrow.
bind -r M-Up resize-pane -U 5
bind -r M-Down resize-pane -D 5
bind -r M-Left resize-pane -L 5
bind -r M-Right resize-pane -R 5
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# Some macOS terminals send Option+Left/Right as Meta-b/Meta-f.
bind -r M-b resize-pane -L 5
bind -r M-f resize-pane -R 5

# Smart pane switching between tmux panes and Vim/Neovim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n C-\\ if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

set -g @plugin 'tmux-plugins/tmux-yank'
