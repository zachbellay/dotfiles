# Terminal and input behavior
set -g default-terminal "tmux-256color"
set -g terminal-features "xterm*:clipboard:ccolour:cstyle:extkeys:focus:title,screen*:title,rxvt*:ignorefkeys,xterm-ghostty:RGB:extkeys:hyperlinks"
set -gq allow-passthrough on
set -g mouse on
set -sg escape-time 10
set -g focus-events on
set -s extended-keys always
set -sq extended-keys-format csi-u
set -g history-limit 1000000
set -g status-interval 5
set -g status-right '#(ai-agents summary 2>/dev/null) | #{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}"#{=21:pane_title}" %H:%M %d-%b-%y'
# Ghostty sends Shift+Enter as CSI-u; keep it distinct from Ctrl-J so
# Codex and other TUIs can handle it as Shift+Enter instead of Enter/LF.

# Index panes and windows from 1.
set -g base-index 1
setw -g pane-base-index 1

# Use vi keys in copy mode.
setw -g mode-keys vi

# Vim-style copy-mode selection.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi i send-keys -X select-word
bind-key -T copy-mode-vi C-w send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "pbcopy"

# Make mouse wheel scrollback less jumpy.
bind-key -T copy-mode-vi WheelUpPane send-keys -N 2 -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -N 2 -X scroll-down
bind-key -T copy-mode-emacs WheelUpPane send-keys -N 2 -X scroll-up
bind-key -T copy-mode-emacs WheelDownPane send-keys -N 2 -X scroll-down

# Move between panes with prefix + arrow.
bind -r Up select-pane -U
bind -r Down select-pane -D
bind -r Left select-pane -L
bind -r Right select-pane -R

# Resize panes with prefix + Option/Alt + arrow.
bind -r M-Up resize-pane -U 5
bind -r M-Down resize-pane -D 5
bind -r M-Left resize-pane -L 5
bind -r M-Right resize-pane -R 5
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# Some macOS terminals send Option+Left/Right as Meta-b/Meta-f.
bind -r M-b resize-pane -L 5
bind -r M-f resize-pane -R 5

# Pick, create, and remove monorepo worktree sessions.
bind-key -r f run-shell "tmux new-window -n worktrees tmux-worktree-sessionizer"
bind-key -r N command-prompt -p "new worktree branch:" "run-shell 'tmux-worktree-sessionizer new %%'"
bind-key -r C run-shell "tmux new-window -n worktree-cleanup 'tmux-worktree-sessionizer remove'"

# Create or switch to a lightweight named Codex session in the current directory.
bind-key -r M command-prompt -p "codex session name:" "run-shell 'tmux-codex-session \"%%\" \"#{pane_current_path}\"'"

# Pick agent sessions by readiness state.
bind-key -r S display-popup -w 90% -h 80% -E "ai-agents fzf"
bind-key -r A display-popup -w 90% -h 80% -E "ai-agents watch"

# Workmux overview controls.
bind-key -r O display-popup -w 80 -h 12 -d "#{pane_current_path}" -E "workmux-new-popup"
bind-key -r B run-shell "workmux sidebar -s"
bind-key -r G display-popup -w 95% -h 90% -E "workmux dashboard -s"
bind-key -r W display-popup -w 95% -h 90% -E "workmux dashboard -s --tab worktrees"

# Smart pane switching between tmux panes and Vim/Neovim windows.
# Neovim receives Ctrl-h/j/k/l first so it can move between editor and explorer windows.
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n C-\\ if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"

set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'

# Keep the selected pane obvious on light terminal themes.
setw -g pane-border-lines heavy
setw -g pane-border-style fg=colour245
setw -g pane-active-border-style fg=colour28,bold
